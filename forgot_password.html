<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Montage Auto Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: '#111111', light: '#FAFAFA' }
                }
            }
        }
    </script>
</head>
<body class="bg-light text-dark font-sans antialiased flex items-center justify-center min-h-screen selection:bg-dark selection:text-light">

    <div class="bg-white p-8 w-full max-w-sm rounded-[2rem] shadow-2xl border border-neutral-100 relative mx-4">
        <!-- Logo/Brand Icon representation -->
        <div class="flex justify-center mb-6">
            <a href="index.html" class="flex flex-col items-center">
                <span class="text-xs font-black uppercase tracking-[0.25em] text-neutral-800">Montage</span>
                <span class="text-[8px] font-bold uppercase tracking-[0.4em] text-neutral-400 mt-1">Auto Studio</span>
            </a>
        </div>

        <div class="text-center mb-6">
            <h3 class="text-lg font-bold uppercase tracking-tight">Reset Password</h3>
            <p class="text-xs text-neutral-400 font-normal mt-1.5 leading-relaxed">Enter your registered email and we'll send you a secure link to reset your password.</p>
        </div>

        <form id="forgotPasswordForm" onsubmit="handleRequestReset(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-neutral-400 mb-2">Email Address</label>
                <input type="email" id="resetEmail" placeholder="e.g. client@domain.com" required class="w-full bg-neutral-50 border border-neutral-200 p-3.5 rounded-full text-xs font-semibold focus:outline-none focus:border-dark px-5">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-dark text-light text-xs font-bold tracking-widest uppercase py-3.5 rounded-full border border-dark hover:bg-neutral-800 shadow-sm transition-all flex items-center justify-center">
                <span>Send Reset Link</span>
            </button>
        </form>

        <div id="statusMessage" class="hidden mt-6 p-4 rounded-2xl text-xs font-semibold text-center"></div>

        <div class="mt-6 pt-4 border-t border-neutral-100 text-center">
            <a href="index.html" class="text-xs font-bold tracking-wider uppercase text-neutral-800 hover:text-black underline underline-offset-4 transition-colors">Back to Home</a>
        </div>
    </div>

    <script>
        async function handleRequestReset(event) {
            event.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Processing...</span>
            `;

            statusMessage.className = "hidden";

            try {
                const response = await fetch('api/auth/request_reset.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-green-50 text-green-700 border border-green-100 block animate-fade-in";
                    statusMessage.innerText = result.message || "A secure password reset link has been dispatched to your email.";
                    document.getElementById('forgotPasswordForm').reset();
                } else {
                    statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-red-50 text-red-700 border border-red-100 block";
                    statusMessage.innerText = result.message || "Failed to process request. Please try again.";
                }
            } catch (err) {
                console.error("Forgot password request failed:", err);
                statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-red-50 text-red-700 border border-red-100 block";
                statusMessage.innerText = "Network error. Please verify your connection and try again.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "<span>Send Reset Link</span>";
            }
        }
    </script>
</body>
</html>
