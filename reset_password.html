<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Montage Auto Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: '#111111', light: '#FAFAFA' }
                }
            }
        }
    </script>
</head>
<body class="bg-light text-dark font-sans antialiased flex items-center justify-center min-h-screen selection:bg-dark selection:text-light">

    <div class="bg-white p-8 w-full max-w-sm rounded-[2rem] shadow-2xl border border-neutral-100 relative mx-4">
        <!-- Logo/Brand Icon representation -->
        <div class="flex justify-center mb-6">
            <a href="index.html" class="flex flex-col items-center">
                <span class="text-xs font-black uppercase tracking-[0.25em] text-neutral-800">Montage</span>
                <span class="text-[8px] font-bold uppercase tracking-[0.4em] text-neutral-400 mt-1">Auto Studio</span>
            </a>
        </div>

        <!-- Token Missing or Invalid UI Container -->
        <div id="invalidTokenContainer" class="hidden text-center">
            <div class="flex justify-center mb-4 text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold uppercase tracking-tight">Invalid Link</h3>
            <p class="text-xs text-neutral-400 font-normal mt-1.5 leading-relaxed">This password reset link is invalid, expired, or has already been used.</p>
            <div class="mt-6 pt-4 border-t border-neutral-100 flex flex-col space-y-3">
                <a href="forgot_password.html" class="bg-dark text-light text-xs font-bold tracking-widest uppercase py-3.5 rounded-full border border-dark hover:bg-neutral-800 shadow-sm transition-all">Request New Link</a>
                <a href="index.html" class="text-xs font-bold tracking-wider uppercase text-neutral-500 hover:text-black transition-colors">Back to Home</a>
            </div>
        </div>

        <!-- Reset Form Container -->
        <div id="resetFormContainer">
            <div class="text-center mb-6">
                <h3 class="text-lg font-bold uppercase tracking-tight font-black">Choose New Password</h3>
                <p class="text-xs text-neutral-400 font-normal mt-1.5 leading-relaxed">Please choose a secure new password for your Montage Auto Studio portal account.</p>
            </div>

            <form id="resetPasswordForm" onsubmit="handleResetPassword(event)" class="space-y-4">
                <div class="relative w-full">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-neutral-400 mb-2">New Password</label>
                    <input type="password" id="newPassword" placeholder="Minimum 6 characters" required class="w-full bg-neutral-50 border border-neutral-200 p-3.5 rounded-full text-xs font-semibold focus:outline-none focus:border-dark px-5 pr-12" oninput="checkPasswordStrength(this.value)">
                    <button type="button" class="absolute right-4 top-[38px] text-neutral-400 hover:text-dark focus:outline-none" onclick="togglePasswordVisibility('newPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>

                <!-- Password Strength indicator -->
                <div class="px-2">
                    <div class="h-1 w-full bg-neutral-100 rounded-full overflow-hidden mb-1.5">
                        <div id="strengthBar" class="h-full bg-red-500 transition-all duration-300 w-0"></div>
                    </div>
                    <span id="strengthText" class="text-[9px] font-bold uppercase tracking-wider text-neutral-400">Weak</span>
                </div>

                <div class="relative w-full">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-neutral-400 mb-2">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required class="w-full bg-neutral-50 border border-neutral-200 p-3.5 rounded-full text-xs font-semibold focus:outline-none focus:border-dark px-5">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-dark text-light text-xs font-bold tracking-widest uppercase py-3.5 rounded-full border border-dark hover:bg-neutral-800 shadow-sm transition-all flex items-center justify-center">
                    <span>Update Password</span>
                </button>
            </form>

            <div id="statusMessage" class="hidden mt-6 p-4 rounded-2xl text-xs font-semibold text-center"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Check if token exists in URL parameters on page load
        if (!token) {
            document.getElementById('resetFormContainer').classList.add('hidden');
            document.getElementById('invalidTokenContainer').classList.remove('hidden');
        }

        function togglePasswordVisibility(fieldId, btn) {
            const input = document.getElementById(fieldId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-dark">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.815 7.815 3 3m-3-3-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                    </svg>
                `;
            } else {
                input.type = 'password';
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                `;
            }
        }

        function checkPasswordStrength(password) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            if (!password || password.length < 6) {
                bar.className = "h-full bg-red-500 transition-all duration-300 w-1/4";
                text.innerText = "Too Short (Min 6)";
                text.className = "text-[9px] font-bold uppercase tracking-wider text-red-500";
                return;
            }

            // Calculations based on regex
            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            if (score === 0 || score === 1) {
                bar.className = "h-full bg-orange-500 transition-all duration-300 w-2/4";
                text.innerText = "Medium";
                text.className = "text-[9px] font-bold uppercase tracking-wider text-orange-500";
            } else if (score === 2 || score === 3) {
                bar.className = "h-full bg-blue-500 transition-all duration-300 w-3/4";
                text.innerText = "Strong";
                text.className = "text-[9px] font-bold uppercase tracking-wider text-blue-500";
            } else {
                bar.className = "h-full bg-green-500 transition-all duration-300 w-full";
                text.innerText = "Very Secure";
                text.className = "text-[9px] font-bold uppercase tracking-wider text-green-500";
            }
        }

        async function handleResetPassword(event) {
            event.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');

            if (password.length < 6) {
                statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-red-50 text-red-700 border border-red-100 block";
                statusMessage.innerText = "Password must be at least 6 characters long.";
                return;
            }

            if (password !== confirmPassword) {
                statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-red-50 text-red-700 border border-red-100 block";
                statusMessage.innerText = "Passwords do not match.";
                return;
            }

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Resetting...</span>
            `;

            statusMessage.className = "hidden";

            try {
                const response = await fetch('api/auth/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: password })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-green-50 text-green-700 border border-green-100 block";
                    statusMessage.innerText = result.message || "Your password has been successfully updated.";
                    
                    // Redirect to Home after 3 seconds so they can log in
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-red-50 text-red-700 border border-red-100 block";
                    statusMessage.innerText = result.message || "Failed to reset password. Link may be expired.";
                }
            } catch (err) {
                console.error("Password reset update failed:", err);
                statusMessage.className = "mt-6 p-4 rounded-2xl text-xs font-semibold text-center bg-red-50 text-red-700 border border-red-100 block";
                statusMessage.innerText = "Network error. Please verify your connection and try again.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "<span>Update Password</span>";
            }
        }
    </script>
</body>
</html>
